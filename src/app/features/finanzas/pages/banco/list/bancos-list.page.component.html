<app-smart-table title="Bancos" subtitle="Gestión de instituciones financieras" [data]="store.pagedItems()"
    [columns]="columns" [total]="store.totalItems()" [pageIndex]="store.pageIndex()" [pageSize]="store.pageSize()"
    [loading]="store.loading()" [showCreate]="true" createText="Nuevo Banco" (onAction)="onAction($event)"
    (onPageChange)="store.onPageChange($event)" (onFilterChange)="store.setFilter($event.key, $event.value)"
    (clearFilters)="store.clearFilters()">
</app-smart-table>

<ng-template #deleteDialog let-data>
    <h2 mat-dialog-title>Eliminar Banco</h2>
    <mat-dialog-content>
        <p>¿Estás seguro que deseas eliminar el banco <strong>{{data.banco}}</strong>?</p>
        <p class="text-sm text-red-600 mt-2">Esta acción no se puede deshacer.</p>
    </mat-dialog-content>
    <mat-dialog-actions align="end">
        <button mat-button mat-dialog-close>Cancelar</button>
        <button mat-flat-button color="warn" [mat-dialog-close]="true">Eliminar</button>
    </mat-dialog-actions>
</ng-template>
