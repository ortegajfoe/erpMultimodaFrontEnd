<div class="h-full flex flex-col md:flex-row bg-gray-50 overflow-hidden" style="height: calc(100vh - 64px);">

    <app-settings-sidebar [activeSection]="activeSection()" (sectionChange)="activeSection.set($event)">
    </app-settings-sidebar>

    <main class="flex-grow h-full overflow-hidden flex flex-col lg:flex-row">

        <div class="flex-grow h-full overflow-y-auto p-6 md:p-8 lg:w-5/12 border-r border-gray-200 shadow-sm z-10">
            <div class="flex flex-col gap-6">

                <div class="mb-2 flex items-center justify-between">
                    <div>
                        <h1 class="text-2xl font-bold text-gray-800">{{ getSectionTitle() }}</h1>
                        <p class="text-gray-500 text-sm mt-1">{{ getSectionDescription() }}</p>
                    </div>
                    <button mat-icon-button color="primary" (click)="saveConfig()" matTooltip="Guardar Cambios">
                        <mat-icon>save</mat-icon>
                    </button>
                </div>

                @switch (activeSection()) {
                @case ('appearance') { <app-appearance-panel /> }
                @case ('typography') { <app-typography-panel /> }
                @case ('density') { <app-density-panel /> }
                @case ('tables') { <app-tables-panel /> }
                @case ('buttons') { <app-buttons-panel /> }
                @case ('inputs') { <app-forms-panel /> }
                }

            </div>
        </div>

        <app-settings-preview class="flex-grow lg:w-7/12 h-full bg-gray-100 overflow-hidden"
            [activeSection]="activeSection()">
        </app-settings-preview>

    </main>
</div>
