<div class="h-full flex flex-col md:flex-row bg-gray-50 dark:bg-slate-950 overflow-hidden"
    style="height: calc(100vh - 64px);">

    <app-settings-sidebar [activeSection]="activeSection()" (sectionChange)="activeSection.set($event)">
    </app-settings-sidebar>

    <main class="flex-grow h-full overflow-hidden flex flex-col lg:flex-row">

        <div
            class="flex-grow h-full flex flex-col lg:w-5/12 border-r border-gray-200 dark:border-gray-700 shadow-sm z-10 bg-white dark:bg-slate-900">
            <div class="flex-grow overflow-y-auto p-6 md:p-8">
                <div class="flex flex-col gap-6">

                    <div class="mb-2 flex items-center justify-between">
                        <div>
                            <h1 class="text-2xl font-bold text-gray-800 dark:text-white">{{ getSectionTitle() }}</h1>
                            <p class="text-gray-500 dark:text-gray-400 text-sm mt-1">{{ getSectionDescription() }}</p>
                        </div>
                    </div>

                    @switch (activeSection()) {
                    @case ('appearance') { <app-appearance-panel /> }
                    @case ('typography') { <app-typography-panel /> }
                    @case ('density') { <app-density-panel /> }
                    @case ('tables') { <app-tables-panel /> }
                    @case ('buttons') { <app-buttons-panel /> }
                    @case ('inputs') { <app-forms-panel /> }
                    }

                </div>
            </div>

            <div class="p-4 border-t border-gray-100 dark:border-gray-800 bg-white dark:bg-slate-900 flex-shrink-0">
                <ui-button variant="outline-primary" [fullWidth]="true" [loading]="configStore.loading()"
                    (onClick)="saveChanges()">
                    <span class="flex items-center justify-center gap-2">
                        <mat-icon>save</mat-icon> Guardar Cambios
                    </span>
                </ui-button>
            </div>
        </div>


        <app-settings-preview class="flex-grow lg:w-7/12 h-full bg-gray-100 dark:bg-slate-950 overflow-hidden"
            [activeSection]="activeSection()">
        </app-settings-preview>

    </main>
</div>
