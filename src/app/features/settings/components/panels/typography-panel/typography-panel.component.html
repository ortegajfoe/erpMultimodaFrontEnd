<mat-card class="p-0 overflow-hidden border border-gray-200 shadow-sm">
    <div class="p-4 border-b bg-gray-50 font-medium text-gray-700">Fuentes</div>
    <div class="p-6 flex flex-col gap-6">
        <div>
            <h4 class="font-medium mb-4 text-gray-900">Familia Tipográfica</h4>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div (click)="updateFontFamily('inter')"
                    class="cursor-pointer border-2 rounded-xl p-4 hover:bg-gray-50 transition-all"
                    [class.border-primary]="themeService.settings().fontFamily === 'inter'"
                    [class.bg-blue-50]="themeService.settings().fontFamily === 'inter'"
                    [class.border-transparent]="themeService.settings().fontFamily !== 'inter'">
                    <div class="font-bold text-lg mb-1" style="font-family: 'Inter', sans-serif;">Ag
                    </div>
                    <div class="font-medium text-sm">Inter</div>
                    <div class="text-xs text-gray-400">Estándar</div>
                </div>
                <div (click)="updateFontFamily('roboto')"
                    class="cursor-pointer border-2 rounded-xl p-4 hover:bg-gray-50 transition-all bg-white border-gray-100"
                    [class.border-primary]="themeService.settings().fontFamily === 'roboto'"
                    [class.bg-blue-50]="themeService.settings().fontFamily === 'roboto'">
                    <div class="font-bold text-lg mb-1" style="font-family: 'Roboto', sans-serif;">Ag
                    </div>
                    <div class="font-medium text-sm">Roboto</div>
                    <div class="text-xs text-gray-400">Android</div>
                </div>
                <div (click)="updateFontFamily('system')"
                    class="cursor-pointer border-2 rounded-xl p-4 hover:bg-gray-50 transition-all bg-white border-gray-100"
                    [class.border-primary]="themeService.settings().fontFamily === 'system'"
                    [class.bg-blue-50]="themeService.settings().fontFamily === 'system'">
                    <div class="font-bold text-lg mb-1" style="font-family: system-ui;">Ag</div>
                    <div class="font-medium text-sm">System</div>
                    <div class="text-xs text-gray-400">Nativo</div>
                </div>
            </div>
        </div>

        <mat-divider></mat-divider>

        <div>
            <h4 class="font-medium mb-3 text-gray-900">Tamaño de Texto (Escala)</h4>
            <div class="flex items-center gap-6 bg-gray-50 p-4 rounded-lg">
                <span class="text-xs font-bold text-gray-400">A</span>
                <mat-slider min="0" max="2" step="1" showTickMarks class="flex-grow">
                    <input matSliderThumb
                        [ngModel]="['small','normal','large'].indexOf(themeService.settings().fontScale)"
                        (ngModelChange)="updateFontScale($event)">
                </mat-slider>
                <span class="text-xl font-bold text-gray-800">A</span>
            </div>
            <div class="flex justify-between text-xs text-gray-400 mt-2 px-2">
                <span>Pequeño</span>
                <span>Normal</span>
                <span>Grande</span>
            </div>
        </div>
    </div>
</mat-card>
