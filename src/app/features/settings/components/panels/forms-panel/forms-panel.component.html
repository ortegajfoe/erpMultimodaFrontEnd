<mat-card class="p-0 overflow-hidden border border-gray-200 dark:border-gray-700 shadow-sm bg-white dark:bg-slate-900">
    <div
        class="p-4 border-b bg-gray-50 dark:bg-slate-800/50 font-medium text-gray-700 dark:text-white border-gray-200 dark:border-gray-700">
        Formularios</div>
    <div class="p-6 flex flex-col gap-6">
        <div>
            <h4 class="font-medium mb-3 text-gray-900 dark:text-white">Apariencia Visual</h4>
            <mat-radio-group [ngModel]="themeService.settings().inputAppearance"
                (ngModelChange)="updateInputAppearance($event)" class="flex gap-6">
                <mat-radio-button value="outline">
                    <span class="ml-1 dark:text-gray-200">Outline (Borde)</span>
                </mat-radio-button>
                <mat-radio-button value="fill">
                    <span class="ml-1 dark:text-gray-200">Fill (Fondo relleno)</span>
                </mat-radio-button>
            </mat-radio-group>
        </div>
        <mat-divider></mat-divider>
        <div>
            <h4 class="font-medium mb-3 text-gray-900 dark:text-white">Radio de Borde</h4>
            <div class="flex items-center gap-4 bg-gray-50 dark:bg-slate-800 p-4 rounded-lg">
                <span class="text-xs text-gray-500 dark:text-gray-400">Cuadrado</span>
                <mat-slider min="0" max="16" step="2" showTickMarks class="flex-grow">
                    <input matSliderThumb [ngModel]="themeService.settings().inputRadius"
                        (ngModelChange)="updateInputRadius($event)">
                </mat-slider>
                <span
                    class="text-xs font-bold bg-white dark:bg-slate-700 dark:text-white px-2 py-1 rounded shadow-sm border dark:border-gray-600">{{
                    themeService.settings().inputRadius }}px</span>
            </div>
        </div>
    </div>
</mat-card>
