<aside
    class="w-full md:w-72 bg-white dark:bg-slate-900 border-r border-gray-200 dark:border-gray-700 flex flex-col h-full z-10 shadow-sm flex-shrink-0">
    <div class="p-4 border-b border-gray-100 dark:border-gray-800">
        <h2 class="text-xl font-bold text-gray-800 dark:text-white flex items-center gap-2">
            <mat-icon class="text-gray-400">tune</mat-icon> Configuración
        </h2>
    </div>

    <div class="p-3">
        <div class="relative">
            <mat-icon class="absolute left-3 top-2.5 text-gray-400 text-sm">search</mat-icon>
            <input type="text" placeholder="Buscar configuración..." (input)="updateSearch($event)"
                class="w-full pl-9 pr-3 py-2 bg-gray-100 dark:bg-slate-800 border-none rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-primary dark:text-gray-200 transition-all">
        </div>
    </div>

    <div class="flex-grow overflow-y-auto px-2 pb-4">
        @if (groupedNavItems().length === 0) {
        <div class="p-8 text-center text-gray-400 flex flex-col items-center">
            <mat-icon class="text-4xl mb-2 opacity-50">search_off</mat-icon>
            <span class="text-sm">Sin coincidencias</span>
        </div>
        } @else {
        <mat-nav-list>
            @for (group of groupedNavItems(); track group.name) {
            <div mat-subheader class="font-bold text-gray-400 text-xs tracking-wider mt-4 mb-1 uppercase pl-4">
                {{ group.name }}
            </div>
            @for (item of group.items; track item.id) {
            <mat-list-item (click)="setSection(item.id)"
                [ngClass]="activeSection() === item.id ? 'bg-blue-50 dark:bg-blue-900/20 text-primary' : 'text-gray-600 dark:text-gray-300'"
                class="rounded-lg cursor-pointer hover:bg-gray-50 dark:hover:bg-slate-800 mb-1 transition-colors">
                <mat-icon matListItemIcon [class.text-primary]="activeSection() === item.id" class="text-gray-500">{{
                    item.icon }}</mat-icon>
                <span matListItemTitle class="text-sm font-medium">{{ item.label }}</span>
            </mat-list-item>
            }
            }
        </mat-nav-list>
        }
    </div>

    <div class="p-4 border-t border-gray-100 dark:border-gray-800">
        <ui-button variant="outline-danger" [fullWidth]="true" [loading]="configStore.loading()" (onClick)="reset()">
            <span class="flex items-center justify-center gap-2">
                <mat-icon>restart_alt</mat-icon> Restaurar Todo
            </span>
        </ui-button>
    </div>
</aside>
