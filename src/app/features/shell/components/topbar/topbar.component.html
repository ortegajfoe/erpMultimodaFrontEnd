<mat-toolbar color="primary"
    class="!bg-white dark:!bg-slate-900 !text-gray-800 dark:!text-white shadow-sm border-b border-gray-200 dark:border-gray-800 z-10 relative px-4 md:px-8">
    <button mat-icon-button (click)="toggleSidebar.emit()" class="mr-2 md:hidden text-gray-500">
        <mat-icon>menu</mat-icon>
    </button>

    <span class="font-medium"></span>

    <span class="flex-auto"></span>

    <button mat-icon-button>
        <mat-icon>notifications</mat-icon>
    </button>

    <div class="ml-3 relative group">
        <button [matMenuTriggerFor]="userMenu"
            class="flex items-center gap-2 rounded-full hover:bg-gray-100 dark:hover:bg-slate-800 p-1 pr-3 transition-colors">
            <img src="https://ui-avatars.com/api/?name={{user()?.usuario}}&background=0D8ABC&color=fff"
                class="w-8 h-8 rounded-full border border-gray-200 dark:border-gray-700 object-cover" alt="User Avatar">

            <div class="hidden md:flex flex-col items-start leading-none group-hover:text-primary transition-colors">
                <span class="text-xs font-bold text-gray-700 dark:text-gray-200">{{user()?.usuario}}</span>
                <span class="text-[10px] text-gray-500 font-medium">Administrador</span>
            </div>
            <mat-icon class="text-gray-400 text-sm h-4 w-4">expand_more</mat-icon>
        </button>

        <mat-menu #userMenu="matMenu" xPosition="before" class="mt-2 text-gray-600 custom-profile-menu">
            <div
                class="px-6 py-4 bg-gray-50 dark:bg-slate-900 border-b border-gray-100 dark:border-gray-800 flex flex-col items-center">
                <img src="https://ui-avatars.com/api/?name={{user()?.usuario}}&background=0D8ABC&color=fff&size=64"
                    class="w-16 h-16 rounded-full mb-2 shadow-sm" alt="Profile">
                <span class="font-bold text-gray-800 dark:text-white">{{user()?.usuario}}</span>
                <span class="text-xs text-gray-500">Administrador</span>
            </div>

            <div class="py-2">
                <button mat-menu-item>
                    <mat-icon class="text-gray-400">person</mat-icon>
                    <span>Mi Perfil</span>
                </button>
                <button mat-menu-item routerLink="/app/settings">
                    <mat-icon class="text-gray-400">settings</mat-icon>
                    <span>Ajustes</span>
                </button>
            </div>

            <div class="border-t border-gray-100 dark:border-gray-800 p-2">
                <button mat-menu-item (click)="onLogout()"
                    class="group hover:bg-red-50 dark:hover:bg-red-900/10 rounded-lg">
                    <mat-icon class="text-gray-400 group-hover:text-red-500 transition-colors">logout</mat-icon>
                    <span class="group-hover:text-red-600 transition-colors font-medium">Cerrar Sesión</span>
                </button>
            </div>
        </mat-menu>
    </div>
</mat-toolbar>
