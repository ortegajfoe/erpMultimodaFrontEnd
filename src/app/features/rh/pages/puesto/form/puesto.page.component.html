<app-form-layout [title]="pageTitle" moduleName="RH" subtitle="Información del puesto" [loading]="loading"
    [isValid]="form.valid" (onSave)="save()" (onCancel)="cancel()">
    <div class="max-w-3xl mx-auto">
        <mat-card appearance="outlined" class="bg-white">
            <mat-card-content class="pt-6">
                <form [formGroup]="form" class="flex flex-col gap-4">

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <mat-form-field appearance="outline" class="md:col-span-1">
                            <mat-label>Nombre del Puesto</mat-label>
                            <input matInput formControlName="puesto" placeholder="Ej. Gerente de Ventas" appUpperCase>
                            <mat-error>Requerido</mat-error>
                        </mat-form-field>

                        <mat-form-field appearance="outline" class="md:col-span-1">
                            <mat-label>Departamento</mat-label>
                            <mat-select formControlName="idDepartamento">
                                @for (d of departamentos; track d.idDepartamento) {
                                <mat-option [value]="d.idDepartamento">
                                    {{d.departamento}}
                                </mat-option>
                                } @empty {
                                <mat-option disabled>No hay departamentos</mat-option>
                                }
                            </mat-select>
                            <mat-error>Requerido</mat-error>
                        </mat-form-field>

                        <mat-form-field appearance="outline" class="md:col-span-2">
                            <mat-label>Notas</mat-label>
                            <textarea matInput formControlName="notas" rows="4" placeholder="Opcional"
                                appUpperCase></textarea>
                        </mat-form-field>
                    </div>

                </form>
            </mat-card-content>
        </mat-card>
    </div>
</app-form-layout>
