<app-data-table title="Departamentos" subtitle="Gestión de áreas y departamentos" [rows]="store.pagedItems()"
    [columns]="columns" [total]="store.totalItems()" [pageIndex]="store.pageIndex()" [pageSize]="store.pageSize()"
    [loading]="store.loading()" [showCreate]="true" createText="Nuevo Departamento" (create)="onCreate()"
    (edit)="onEdit($event)" (remove)="confirmDelete(deleteDialog, $event)" (pageChange)="store.onPageChange($event)"
    (filterChange)="store.setFilter($event.key, $event.value)" (clearFilters)="store.clearFilters()">
</app-data-table>


<ng-template #deleteDialog let-data>
    <h2 mat-dialog-title>Eliminar Departamento</h2>
    <mat-dialog-content>
        <p>¿Estás seguro que deseas eliminar el departamento <strong>{{data.departamento}}</strong>?</p>
        <p class="text-sm text-red-600 mt-2">Esta acción no se puede deshacer.</p>
    </mat-dialog-content>
    <mat-dialog-actions align="end">
        <button mat-button mat-dialog-close>Cancelar</button>
        <button mat-flat-button color="warn" [mat-dialog-close]="true">Eliminar</button>
    </mat-dialog-actions>
</ng-template>
