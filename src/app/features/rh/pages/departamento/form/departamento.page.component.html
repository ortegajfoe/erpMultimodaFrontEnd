<app-form-layout [title]="pageTitle" moduleName="RH" subtitle="Información del departamento" [loading]="loading"
    [isValid]="form.valid" (onSave)="save()" (onCancel)="cancel()">
    <div class="max-w-3xl mx-auto">
        <mat-card appearance="outlined" class="bg-white">
            <mat-card-content class="pt-6">
                <form [formGroup]="form" class="flex flex-col gap-4">

                    <mat-form-field appearance="outline">
                        <mat-label>Nombre del Departamento</mat-label>
                        <input matInput formControlName="departamento" placeholder="Ej. Recursos Humanos" appUpperCase>
                        <mat-error>Requerido</mat-error>
                    </mat-form-field>

                    <mat-form-field appearance="outline">
                        <mat-label>Notas</mat-label>
                        <textarea matInput formControlName="notas" rows="4" placeholder="Opcional"
                            appUpperCase></textarea>
                    </mat-form-field>

                </form>
            </mat-card-content>
        </mat-card>
    </div>
</app-form-layout>
