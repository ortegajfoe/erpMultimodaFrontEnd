<div class="space-y-6">
    <div class="flex justify-between items-center">
        <h3 class="text-lg font-medium text-gray-800">Expediente Digital</h3>
    </div>

    <div class="app-card p-4 rounded-lg bg-gray-50 border border-blue-200">
        <h4 class="text-md font-semibold mb-3">Subir Nuevo Documento</h4>
        <form [formGroup]="form" (ngSubmit)="upload()" class="grid grid-cols-12 gap-4 items-end">

            <mat-form-field appearance="outline" class="col-span-12 md:col-span-4">
                <mat-label>Tipo de Documento</mat-label>
                <mat-select formControlName="idTipoDocumento">
                    @for (tipo of tiposDocumento(); track tipo.idTipoDocumento) {
                    <mat-option [value]="tipo.idTipoDocumento">{{ tipo.nombre }}</mat-option>
                    }
                </mat-select>
                <mat-error>Requerido</mat-error>
            </mat-form-field>

            <div class="col-span-12 md:col-span-8 flex flex-col gap-1 pb-4">
                <label class="text-sm font-medium text-gray-600">Archivo (PDF, Img)</label>
                <input #fileInput type="file" (change)="onFileSelected($event)" accept=".pdf,image/*" class="block w-full text-sm text-gray-500
                        file:mr-4 file:py-2 file:px-4
                        file:rounded-full file:border-0
                        file:text-sm file:font-semibold
                        file:bg-blue-50 file:text-blue-700
                        hover:file:bg-blue-100">
                <div *ngIf="form.get('file')?.invalid && form.get('file')?.touched" class="text-xs text-red-500 ml-2">
                    Requerido</div>
            </div>

            <mat-form-field appearance="outline" class="col-span-12 md:col-span-3">
                <mat-label>Fecha Vencimiento</mat-label>
                <input matInput [matDatepicker]="pickerVence" formControlName="fechaVence">
                <mat-datepicker-toggle matIconSuffix [for]="pickerVence"></mat-datepicker-toggle>
                <mat-datepicker #pickerVence></mat-datepicker>
            </mat-form-field>

            <mat-form-field appearance="outline" class="col-span-12 md:col-span-3">
                <mat-label>Aviso Días (Anticipación)</mat-label>
                <input matInput formControlName="avisoDias" placeholder="ej. 15" appOnlyNumbers [maxLen]="3">
            </mat-form-field>

            <mat-form-field appearance="outline" class="col-span-12 md:col-span-6">
                <mat-label>Notas</mat-label>
                <input matInput formControlName="notas" appUpperCase>
            </mat-form-field>

            <!-- <div class="col-span-12 flex justify-end">
                 <button mat-flat-button color="primary" type="submit" [disabled]="loading()">
                    @if (loading()) {
                        <mat-icon class="animate-spin">sync</mat-icon> Subiendo...
                    } @else {
                        <mat-icon>cloud_upload</mat-icon> Subir Documento
                    }
                </button>
            </div> -->
        </form>
    </div>

    <div class="mt-6">
        <app-smart-table [data]="documentos()" [columns]="columns" [total]="documentos().length" [pageSize]="10"
            [loading]="loading()" [customActions]="customActions" (onAction)="onAction($event)">
        </app-smart-table>
    </div>
</div>
