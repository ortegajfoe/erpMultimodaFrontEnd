<div class="login-container">
    <mat-card class="login-card">
        <mat-card-header>
            <mat-card-title>Bienvenido</mat-card-title>
            <mat-card-subtitle>Inicia sesión para continuar</mat-card-subtitle>
        </mat-card-header>

        <mat-card-content>
            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Usuario</mat-label>
                    <input matInput formControlName="usuario" placeholder="Ingresa tu usuario">
                    <mat-icon matSuffix>person</mat-icon>
                    @if (loginForm.get('usuario')?.hasError('required')) {
                    <mat-error>El usuario es requerido</mat-error>
                    }
                </mat-form-field>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Contraseña</mat-label>
                    <input matInput [type]="hidePassword() ? 'password' : 'text'" formControlName="password">
                    <button mat-icon-button matSuffix (click)="togglePassword($event)" type="button">
                        <mat-icon>{{ hidePassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
                    </button>
                    @if (loginForm.get('password')?.hasError('required')) {
                    <mat-error>La contraseña es requerida</mat-error>
                    }
                </mat-form-field>

                @if (errorMessage()) {
                <div class="error-message">
                    {{ errorMessage() }}
                </div>
                }

                <div class="actions">
                    <button mat-flat-button color="primary" type="submit" [disabled]="loginForm.invalid || isLoading()"
                        class="submit-btn">
                        @if (isLoading()) {
                        <mat-spinner diameter="20"></mat-spinner>
                        } @else {
                        INGRESAR
                        }
                    </button>
                </div>

            </form>
        </mat-card-content>
    </mat-card>
</div>
