<div class="page-container">
    <mat-card class="form-card">
        <mat-card-header>
            <mat-card-title>{{ isEditing() ? 'Editar Empresa' : 'Nueva Empresa' }}</mat-card-title>
        </mat-card-header>
        <mat-card-content>
            <form [formGroup]="form" (ngSubmit)="onSubmit()" class="empresa-form">

                <div class="grid-2">
                    <mat-form-field appearance="outline">
                        <mat-label>Nombre</mat-label>
                        <input matInput formControlName="nombre" placeholder="Nombre Comercial">
                        <mat-error *ngIf="form.get('nombre')?.hasError('required')">Requerido</mat-error>
                    </mat-form-field>

                    <mat-form-field appearance="outline">
                        <mat-label>RFC</mat-label>
                        <input matInput formControlName="rfc" placeholder="RFC">
                        <mat-error *ngIf="form.get('rfc')?.hasError('required')">Requerido</mat-error>
                    </mat-form-field>
                </div>

                <div class="grid-2">
                    <mat-form-field appearance="outline">
                        <mat-label>Teléfono</mat-label>
                        <input matInput formControlName="telefono">
                    </mat-form-field>

                    <mat-form-field appearance="outline">
                        <mat-label>Email</mat-label>
                        <input matInput formControlName="email">
                        <mat-error *ngIf="form.get('email')?.hasError('email')">Email inválido</mat-error>
                    </mat-form-field>
                </div>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Dirección</mat-label>
                    <input matInput formControlName="direccion">
                </mat-form-field>


                <div class="grid-3">
                    <mat-form-field appearance="outline">
                        <mat-label>ID Régimen Fiscal</mat-label>
                        <input matInput type="number" formControlName="idRegimenFiscal">
                    </mat-form-field>

                    <mat-form-field appearance="outline">
                        <mat-label>ID Moneda</mat-label>
                        <input matInput type="number" formControlName="idMoneda">
                    </mat-form-field>

                    <mat-form-field appearance="outline">
                        <mat-label>CP</mat-label>
                        <input matInput formControlName="cp">
                    </mat-form-field>
                </div>

                <div class="grid-3">
                    <mat-form-field appearance="outline">
                        <mat-label>ID País</mat-label>
                        <input matInput type="number" formControlName="idPais">
                    </mat-form-field>

                    <mat-form-field appearance="outline">
                        <mat-label>ID Ciudad</mat-label>
                        <input matInput type="number" formControlName="idCiudad">
                    </mat-form-field>

                    <mat-form-field appearance="outline">
                        <mat-label>Estado (Status)</mat-label>
                        <input matInput formControlName="estado">
                    </mat-form-field>
                </div>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Notas</mat-label>
                    <textarea matInput formControlName="notas" rows="3"></textarea>
                </mat-form-field>

                <div class="actions">
                    <button mat-button type="button" (click)="onCancel()">Cancelar</button>
                    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || isLoading()">
                        {{ isEditing() ? 'Actualizar' : 'Guardar' }}
                    </button>
                </div>

            </form>
        </mat-card-content>
    </mat-card>
</div>
