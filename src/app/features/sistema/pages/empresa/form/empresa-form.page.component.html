<app-form-layout [title]="isEditing() ? 'Editar Empresa' : 'Nueva Empresa'" moduleName="Sistema"
    subtitle="Gestión de empresas" [loading]="isLoading()" [isValid]="form.valid" (onSave)="save()"
    (onCancel)="cancel()">
    <div class="max-w-3xl mx-auto">
        <mat-card appearance="outlined" class="bg-white">
            <mat-card-content class="pt-6">
                <form [formGroup]="form" class="flex flex-col gap-4">

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <mat-form-field appearance="outline">
                            <mat-label>Nombre</mat-label>
                            <input matInput formControlName="nombre" placeholder="Nombre Comercial" appUpperCase>
                            <mat-error *ngIf="form.get('nombre')?.hasError('required')">Requerido</mat-error>
                        </mat-form-field>

                        <mat-form-field appearance="outline">
                            <mat-label>RFC</mat-label>
                            <input matInput formControlName="rfc" placeholder="RFC" appUpperCase>
                            <mat-error *ngIf="form.get('rfc')?.hasError('required')">Requerido</mat-error>
                        </mat-form-field>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <mat-form-field appearance="outline">
                            <mat-label>Teléfono</mat-label>
                            <input matInput formControlName="telefono">
                        </mat-form-field>

                        <mat-form-field appearance="outline">
                            <mat-label>Email</mat-label>
                            <input matInput formControlName="email">
                            <mat-error *ngIf="form.get('email')?.hasError('email')">Email inválido</mat-error>
                        </mat-form-field>
                    </div>

                    <mat-form-field appearance="outline" class="w-full">
                        <mat-label>Dirección</mat-label>
                        <input matInput formControlName="direccion" appUpperCase>
                    </mat-form-field>


                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <mat-form-field appearance="outline">
                            <mat-label>ID Régimen Fiscal</mat-label>
                            <input matInput type="number" formControlName="idRegimenFiscal">
                        </mat-form-field>

                        <mat-form-field appearance="outline">
                            <mat-label>ID Moneda</mat-label>
                            <input matInput type="number" formControlName="idMoneda">
                        </mat-form-field>

                        <mat-form-field appearance="outline">
                            <mat-label>CP</mat-label>
                            <input matInput formControlName="cp">
                        </mat-form-field>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <mat-form-field appearance="outline">
                            <mat-label>ID País</mat-label>
                            <input matInput type="number" formControlName="idPais">
                        </mat-form-field>

                        <mat-form-field appearance="outline">
                            <mat-label>ID Ciudad</mat-label>
                            <input matInput type="number" formControlName="idCiudad">
                        </mat-form-field>

                        <mat-form-field appearance="outline">
                            <mat-label>Estado (Status)</mat-label>
                            <input matInput formControlName="estado">
                        </mat-form-field>
                    </div>

                    <mat-form-field appearance="outline" class="w-full">
                        <mat-label>Notas</mat-label>
                        <textarea matInput formControlName="notas" rows="3" appUpperCase></textarea>
                    </mat-form-field>

                </form>
            </mat-card-content>
        </mat-card>
    </div>
</app-form-layout>
