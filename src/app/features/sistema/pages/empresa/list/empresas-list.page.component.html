<app-smart-table title="Empresas" subtitle="Catálogo de Empresas" [columns]="columns" [data]="store.pagedItems()"
    [total]="store.totalItems()" [loading]="store.loading()" [pageIndex]="store.pageIndex()"
    [pageSize]="store.pageSize()" [showCreate]="true" createText="Nueva Empresa" (onAction)="onAction($event)"
    (onPageChange)="store.onPageChange($event)" (onFilterChange)="store.setFilter($event.key, $event.value)"
    (clearFilters)="store.clearFilters()"></app-smart-table>

<ng-template #deleteConfirmDialog let-data>
    <h2 mat-dialog-title>Confirmar eliminación</h2>
    <mat-dialog-content>
        ¿Está seguro que desea eliminar a <strong>{{ data.nombre }}</strong>?
    </mat-dialog-content>
    <mat-dialog-actions align="end">
        <button mat-button mat-dialog-close>Cancelar</button>
        <button mat-flat-button color="warn" [mat-dialog-close]="true">Eliminar</button>
    </mat-dialog-actions>
</ng-template>
