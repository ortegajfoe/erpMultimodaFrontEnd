<app-form-layout [title]="isEditing() ? 'Editar Usuario' : 'Nuevo Usuario'" moduleName="Sistema"
    subtitle="Gestión de usuarios" [loading]="isLoading()" [isValid]="form.valid" (onSave)="save()"
    (onCancel)="cancel()">
    <div class="max-w-3xl mx-auto">
        <mat-card appearance="outlined" class="bg-white">
            <mat-card-content class="pt-6">
                <form [formGroup]="form" class="flex flex-col gap-4">

                    <mat-form-field appearance="outline">
                        <mat-label>Usuario</mat-label>
                        <input matInput formControlName="usuario" placeholder="Nombre de usuario" appUpperCase>
                        <mat-error *ngIf="form.get('usuario')?.hasError('required')">Requerido</mat-error>
                    </mat-form-field>

                    <mat-form-field appearance="outline">
                        <mat-label>Contraseña</mat-label>
                        <input matInput [type]="hidePassword() ? 'password' : 'text'" formControlName="passw"
                            [placeholder]="isEditing() ? 'Dejar en blanco para mantener' : 'Contraseña'">
                        <button mat-icon-button matSuffix (click)="togglePassword($event)" type="button">
                            <mat-icon>{{ hidePassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
                        </button>
                        <mat-error *ngIf="form.get('passw')?.hasError('required')">Requerido</mat-error>
                    </mat-form-field>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <mat-form-field appearance="outline">
                            <mat-label>Rol</mat-label>
                            <mat-select formControlName="idRol">
                                @for (rol of roles; track rol.id) {
                                <mat-option [value]="rol.id">{{ rol.nombre }}</mat-option>
                                }
                            </mat-select>
                            <mat-error *ngIf="form.get('idRol')?.hasError('required')">Requerido</mat-error>
                        </mat-form-field>

                        <mat-form-field appearance="outline">
                            <mat-label>Empresa</mat-label>
                            <mat-select formControlName="idEmpresa">
                                @for (emp of empresas; track emp.idEmpresa) {
                                <mat-option [value]="emp.idEmpresa">{{ emp.nombre }}</mat-option>
                                }
                            </mat-select>
                            <mat-error *ngIf="form.get('idEmpresa')?.hasError('required')">Requerido</mat-error>
                        </mat-form-field>
                    </div>

                    <mat-form-field appearance="outline" class="w-full">
                        <mat-label>Trabajador</mat-label>
                        <mat-select formControlName="idTrabajador">
                            @for (t of trabajadores; track t.id) {
                            <mat-option [value]="t.id">{{ t.nombre }}</mat-option>
                            }
                        </mat-select>
                        <mat-error *ngIf="form.get('idTrabajador')?.hasError('required')">Requerido</mat-error>
                    </mat-form-field>

                    <mat-form-field appearance="outline" class="w-full">
                        <mat-label>Notas</mat-label>
                        <textarea matInput formControlName="notas" rows="3" appUpperCase></textarea>
                    </mat-form-field>

                </form>
            </mat-card-content>
        </mat-card>
    </div>
</app-form-layout>
