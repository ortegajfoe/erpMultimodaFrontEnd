<div class="flex flex-col items-center justify-center p-6 text-center">
    <div class="mb-4 p-4 rounded-full bg-red-50 text-red-500 animate-pulse">
        <mat-icon class="scale-150">logout</mat-icon>
    </div>

    <h2 class="text-xl font-bold text-gray-800 mb-2">¿Cerrar Sesión?</h2>

    <p class="text-gray-500 mb-8 text-sm max-w-[250px]">
        Se guardará tu estado actual y serás redirigido al inicio de sesión.
    </p>

    <div class="flex gap-4 w-full justify-center">
        <button mat-button class="w-24 text-gray-500" (click)="onCancel()">
            Cancelar
        </button>
        <button mat-flat-button color="warn" class="w-24 bg-red-500 text-white shadow-lg shadow-red-500/30"
            (click)="onConfirm()">
            Salir
        </button>
    </div>
</div>
