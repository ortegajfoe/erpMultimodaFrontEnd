<div class="flex flex-col items-center justify-center p-12 text-center h-full">
    <mat-icon class="text-6xl text-gray-300 mb-4 scale-150 transform">{{ icon }}</mat-icon>

    <h3 class="text-xl font-bold text-gray-700">{{ title }}</h3>
    <p class="text-gray-500 mt-2 mb-6 max-w-md">{{ message }}</p>

    <button mat-flat-button color="warn" (click)="retry.emit()">
        Reintentar
    </button>
</div>
