<div class="flex flex-col gap-1 w-full">
    @if (label()) {
    <label class="text-sm font-medium text-gray-700 dark:text-gray-300">
        {{ label() }}
        @if (required) { <span class="text-red-500">*</span> }
    </label>
    }

    <div class="relative group">
        @if (icon()) {
        <div
            class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400 group-focus-within:text-primary">
            <mat-icon class="scale-90">{{ icon() }}</mat-icon>
        </div>
        }

        <input [type]="type()" [placeholder]="placeholder()" [value]="value()" [disabled]="disabled()"
            (input)="onInput($event)" (blur)="onTouched()"
            class="w-full text-gray-900 dark:text-white transition-colors focus:outline-none block"
            [class]="appearance() === 'outline' 
                ? 'border border-gray-300 dark:border-gray-600 bg-white dark:bg-slate-800 focus:ring-2 focus:ring-primary/20 dark:focus:ring-primary/40 focus:border-primary rounded-input' 
                : 'bg-gray-100 dark:bg-slate-800 border-b-2 border-gray-300 dark:border-gray-600 rounded-t-lg px-3 pt-5 pb-2 focus:border-primary focus:bg-gray-200 dark:focus:bg-slate-700'"
            [class.pl-10]="icon() && appearance() === 'outline'" [class.px-3]="!icon() && appearance() === 'outline'"
            [class.py-2]="appearance() === 'outline'" [class.pl-10]="icon() && appearance() === 'fill'"
            [class.border-red-500]="hasError()" [class.focus:ring-red-200]="hasError() && appearance() === 'outline'"
            [class.border-b-red-500]="hasError() && appearance() === 'fill'" />

        <!-- Validation Error Message -->
        @if (hasError()) {
        <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none text-red-500">
            <mat-icon class="scale-75">error</mat-icon>
        </div>
        }
    </div>

    @if (hint() && !hasError()) {
    <p class="text-xs text-gray-500">{{ hint() }}</p>
    }

    @if (hasError()) {
    <p class="text-xs text-red-600">{{ getErrorMessage() }}</p>
    }
</div>
