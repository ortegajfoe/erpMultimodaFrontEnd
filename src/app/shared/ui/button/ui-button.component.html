<button [type]="type()" [disabled]="disabled() || loading()" [class]="getClasses()" (click)="onClick.emit($event)"
    class="relative flex items-center justify-center transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-1 disabled:opacity-50 disabled:cursor-not-allowed font-medium rounded-btn">
    @if (loading()) {
    <mat-spinner diameter="20" class="mr-2"></mat-spinner>
    }

    <span [class.opacity-0]="loading()">
        <ng-content></ng-content>
    </span>
</button>
